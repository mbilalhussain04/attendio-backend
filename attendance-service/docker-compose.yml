services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: attendio_attendance
    ports:
      - "5433:5432"
    volumes:
      - attendance_postgres_data:/var/lib/postgresql/data

  attendance-api:
    build: .
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8001:8001"
    depends_on:
      - postgres
    volumes:
      - .:/app
    working_dir: /app
    command: sh -c "alembic upgrade head && python run.py"

  nginx:
    image: nginx:alpine
    depends_on:
      - attendance-api
    ports:
      - "8081:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  attendance_postgres_data:
