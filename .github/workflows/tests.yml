name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install shared test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx fastapi uvicorn
      - name: Run shared and gateway tests
        run: |
          python -m pytest shared/tests
          python -m pytest docs-gateway/tests
