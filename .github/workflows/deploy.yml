name: deploy-backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_BACKEND_ENV_B64: ${{ secrets.VPS_BACKEND_ENV_B64 }}
    steps:
      - name: Deploy backend on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: VPS_BACKEND_ENV_B64
          script_stop: false
          script: |
            set -e
            cd /opt/attendio/backend
            backup_dir="/opt/attendio/backend/backups"
            mkdir -p "$backup_dir"
            if [ -f .env ] && docker compose ps -q platform-postgres >/tmp/attendio-postgres-container 2>/dev/null && [ -s /tmp/attendio-postgres-container ]; then
              existing_pg_user="$(grep -E '^POSTGRES_USER=' .env | tail -1 | cut -d= -f2- | tr -d '\"' || true)"
              existing_pg_user="${existing_pg_user:-attendio}"
              backup_file="$backup_dir/postgres-before-deploy-$(date -u +%Y%m%d%H%M%S).sql.gz"
              echo "Creating pre-deploy Postgres backup: $backup_file"
              if ! docker compose exec -T platform-postgres pg_dumpall -U "$existing_pg_user" | gzip > "$backup_file"; then
                echo "Pre-deploy backup failed; refusing deploy to protect production data."
                exit 1
              fi
              find "$backup_dir" -name 'postgres-before-deploy-*.sql.gz' -mtime +14 -delete || true
            else
              echo "No running Postgres container found; skipping pre-deploy backup."
            fi
            git fetch origin main
            git reset --hard origin/main
            if [ -n "${VPS_BACKEND_ENV_B64:-}" ]; then
              printf '%s' "$VPS_BACKEND_ENV_B64" | base64 -d > .env
              chmod 600 .env
            fi
            test -f .env
            app_env="$(grep -E '^APP_ENV=' .env | tail -1 | cut -d= -f2- | tr -d '\"' || true)"
            if [ "$app_env" != "production" ]; then
              echo "Refusing production deploy because .env has APP_ENV='$app_env'."
              echo "Run make sync-env locally so VPS_BACKEND_ENV_B64 is updated from the production render of Services/.env."
              exit 1
            fi
            set +e
            docker compose up --build -d --remove-orphans
            compose_status=$?
            set -e
            if [ "$compose_status" -ne 0 ]; then
              echo "Docker Compose failed. Service status:"
              docker compose ps || true
              echo "Auth service logs:"
              docker compose logs --tail=160 auth-service
              echo "Attendance service logs:"
              docker compose logs --tail=160 attendance-service
              echo "Leave service logs:"
              docker compose logs --tail=200 leave-service
              echo "Storage service logs:"
              docker compose logs --tail=160 storage-service
              echo "Notification service logs:"
              docker compose logs --tail=160 notification-service
              echo "Billing service logs:"
              docker compose logs --tail=160 billing-service
              echo "Postgres logs:"
              docker compose logs --tail=120 platform-postgres
              exit 1
            fi
            docker compose exec -T nginx nginx -t
            docker compose exec -T nginx nginx -s reload || docker compose restart nginx
            docker compose exec -T auth-service alembic upgrade head
            docker compose exec -T attendance-service alembic upgrade head
            docker compose exec -T storage-service alembic upgrade head
            docker compose exec -T notification-service alembic upgrade head
            docker compose exec -T leave-service alembic upgrade head
            sudo -n /usr/local/bin/attendio-reload-host-nginx || echo "Host Nginx reload skipped; install infra/vps/reload-host-nginx.sh with sudo access."
            docker compose ps
            curl -fsS http://127.0.0.1:8080/nginx-health
            curl -fsS http://127.0.0.1:8080/api/v1/health
