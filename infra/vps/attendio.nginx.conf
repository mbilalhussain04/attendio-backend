server {
  listen 80;
  server_name attendio.technoflick.com api.attendio.technoflick.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name attendio.technoflick.com;

  ssl_certificate /etc/letsencrypt/live/attendio.technoflick.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/attendio.technoflick.com/privkey.pem;

  client_max_body_size 25m;
  large_client_header_buffers 8 64k;
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location / {
    proxy_pass http://127.0.0.1:5174;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

server {
  listen 443 ssl http2;
  server_name api.attendio.technoflick.com;

  ssl_certificate /etc/letsencrypt/live/attendio.technoflick.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/attendio.technoflick.com/privkey.pem;

  client_max_body_size 25m;
  large_client_header_buffers 8 64k;
  proxy_buffer_size 128k;
  proxy_buffers 8 256k;
  proxy_busy_buffers_size 256k;

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection '';
    proxy_read_timeout 120s;
    proxy_connect_timeout 15s;
    proxy_send_timeout 120s;
  }
}
